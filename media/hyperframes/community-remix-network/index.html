<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 1280px; height: 720px; overflow: hidden; background: #050505; }
      #root {
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff1c7;
        background:
          radial-gradient(ellipse at 50% 46%, rgba(214, 181, 109, 0.18), transparent 44%),
          radial-gradient(ellipse at 78% 22%, rgba(255, 241, 199, 0.1), transparent 24%),
          linear-gradient(180deg, #050505, #0d0b07 58%, #030303);
        font-family: "Noto Sans JP", "Segoe UI", sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; padding: 64px 76px; overflow: hidden; }
      .grid {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(214,181,109,.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(214,181,109,.06) 1px, transparent 1px);
        background-size: 46px 46px;
        opacity: .34;
      }
      .sweep { position: absolute; inset: -32% auto -32% -20%; width: 24%; background: linear-gradient(90deg, transparent, rgba(255,241,199,.14), transparent); filter: blur(9px); transform: skewX(-16deg); }
      .gallery {
        position: absolute;
        left: 70px;
        top: 72px;
        width: 722px;
        height: 508px;
        border: 1px solid rgba(255,241,199,.2);
        border-radius: 26px;
        background: linear-gradient(145deg, rgba(255,241,199,.08), transparent 38%), rgba(9,8,6,.92);
        box-shadow: 0 46px 100px rgba(0,0,0,.54), inset 0 1px 0 rgba(255,255,255,.12);
        overflow: hidden;
      }
      .bar { display: flex; align-items: center; gap: 10px; height: 54px; padding: 0 22px; border-bottom: 1px solid rgba(214,181,109,.14); color: rgba(255,241,199,.68); font-size: 14px; font-weight: 900; text-transform: uppercase; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #d6b56d; box-shadow: 0 0 18px rgba(214,181,109,.82); }
      .canvas-card {
        position: absolute;
        left: 84px;
        top: 120px;
        width: 252px;
        height: 220px;
        padding: 16px;
        border: 1px solid rgba(255,241,199,.22);
        border-radius: 18px;
        background: linear-gradient(145deg, rgba(255,241,199,.13), transparent 48%), rgba(18,14,8,.9);
        box-shadow: 0 24px 56px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
      }
      .cover { height: 112px; border-radius: 13px; background: radial-gradient(circle at 56% 38%, rgba(255,241,199,.22), transparent 48%), linear-gradient(135deg, rgba(214,181,109,.32), rgba(12,10,7,.9)); overflow: hidden; }
      .cover::after { display: block; width: 78%; height: 5px; margin: 82px auto 0; border-radius: 999px; background: #d6b56d; box-shadow: 0 0 18px rgba(214,181,109,.48); content: ""; }
      .canvas-card b { display: block; margin-top: 14px; color: #fff7de; font-size: 22px; }
      .canvas-card span { display: block; margin-top: 6px; color: rgba(255,241,199,.6); font-size: 13px; font-weight: 800; }
      .publish { position: absolute; left: 246px; top: 356px; min-height: 38px; padding: 9px 16px; border: 1px solid rgba(255,241,199,.42); border-radius: 999px; color: #fff7de; background: #2b1f10; font-family: "Cascadia Mono","Consolas",monospace; font-size: 13px; font-weight: 900; box-shadow: 0 0 42px rgba(214,181,109,.42); }
      .fork-line { position: absolute; height: 3px; border-radius: 999px; background: linear-gradient(90deg, transparent, rgba(255,241,199,.82), #d6b56d, transparent); filter: drop-shadow(0 0 12px rgba(214,181,109,.6)); transform-origin: left center; }
      .f1 { left: 332px; top: 190px; width: 260px; transform: rotate(-14deg); }
      .f2 { left: 336px; top: 252px; width: 248px; transform: rotate(4deg); }
      .f3 { left: 332px; top: 314px; width: 260px; transform: rotate(20deg); }
      .fork {
        position: absolute;
        right: 84px;
        width: 128px;
        height: 82px;
        border: 1px solid rgba(255,241,199,.18);
        border-radius: 14px;
        background: linear-gradient(145deg, rgba(255,241,199,.12), transparent 48%), rgba(20,16,10,.88);
      }
      .fork::after { position: absolute; left: 14px; right: 14px; bottom: 15px; height: 5px; border-radius: 999px; background: #d6b56d; content: ""; }
      .fork-a { top: 108px; }
      .fork-b { top: 226px; }
      .fork-c { top: 344px; }
      .network-panel {
        position: absolute;
        right: 76px;
        top: 112px;
        width: 318px;
        min-height: 402px;
        padding: 24px;
        border: 1px solid rgba(214,181,109,.24);
        border-radius: 22px;
        background: linear-gradient(145deg, rgba(255,241,199,.12), transparent 46%), rgba(14,11,7,.9);
        box-shadow: 0 32px 84px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
      }
      .label { display: inline-flex; align-items: center; gap: 8px; color: #d6b56d; font-size: 13px; font-weight: 900; text-transform: uppercase; }
      .label::before { width: 8px; height: 8px; border-radius: 50%; background: #d6b56d; box-shadow: 0 0 20px rgba(214,181,109,.86); content: ""; }
      h1 { margin-top: 18px; color: #fff7de; font-size: 38px; line-height: 1.08; }
      h1 span { display: block; }
      p { margin-top: 11px; color: rgba(255,241,199,.64); font-size: 17px; line-height: 1.5; }
      .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 24px; }
      .stat { min-height: 78px; padding: 13px; border: 1px solid rgba(255,241,199,.14); border-radius: 14px; background: rgba(255,241,199,.055); }
      .stat b { color: #fff7de; font-family: "Cascadia Mono","Consolas",monospace; font-size: 26px; }
      .stat span { display: block; margin-top: 4px; color: rgba(255,241,199,.62); font-size: 12px; font-weight: 800; }
      .remix { display: inline-flex; margin-top: 20px; min-height: 38px; padding: 9px 16px; border: 1px solid rgba(255,241,199,.42); border-radius: 999px; color: #fff7de; background: #2b1f10; font-family: "Cascadia Mono","Consolas",monospace; font-size: 13px; font-weight: 900; box-shadow: 0 0 42px rgba(214,181,109,.42); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1280" data-height="720">
      <div id="scene" class="clip scene" data-start="0" data-duration="6" data-track-index="0">
        <div class="grid" data-layout-ignore></div>
        <div class="sweep" data-layout-ignore></div>
        <section class="gallery" data-layout-allow-overflow>
          <div class="bar"><span class="dot"></span> Open Community</div>
          <article class="canvas-card"><div class="cover"></div><b>公开画布</b><span>完整创作路径</span></article>
          <span class="publish">PUBLISH</span>
          <span class="fork-line f1"></span><span class="fork-line f2"></span><span class="fork-line f3"></span>
          <span class="fork fork-a"></span><span class="fork fork-b"></span><span class="fork fork-c"></span>
        </section>
        <section class="network-panel">
          <span class="label">Publish And Remix</span>
          <h1><span>创作者网络</span><span>持续共生</span></h1>
          <p>社区画布被浏览、学习和 fork，新的角色、Agent 与 Skill 会继续长出来。</p>
          <div class="stats">
            <div class="stat"><b>18</b><span>Fork paths</span></div>
            <div class="stat"><b>06</b><span>Remix teams</span></div>
          </div>
          <span class="remix">REMIX CANVAS</span>
        </section>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from(".gallery", { opacity: 0, y: 34, scale: 0.94, duration: 0.62, ease: "power3.out" }, 0.16);
      tl.from(".bar", { opacity: 0, x: -24, duration: 0.44, ease: "expo.out" }, 0.34);
      tl.from(".canvas-card", { opacity: 0, y: 28, scale: 0.78, duration: 0.5, ease: "back.out(1.7)" }, 0.58);
      tl.from(".publish", { opacity: 0, scale: 0.58, y: 16, duration: 0.42, ease: "back.out(1.8)" }, 1.12);
      tl.from(".fork-line", { opacity: 0, scaleX: 0.08, duration: 0.58, stagger: 0.1, ease: "power2.inOut" }, 1.54);
      tl.from(".fork", { opacity: 0, x: 38, scale: 0.78, duration: 0.42, stagger: 0.12, ease: "power3.out" }, 1.86);
      tl.from(".network-panel", { opacity: 0, x: 54, scale: 0.94, duration: 0.62, ease: "expo.out" }, 2.42);
      tl.from(".label", { opacity: 0, y: 16, duration: 0.34, ease: "power3.out" }, 2.6);
      tl.from("h1", { opacity: 0, y: 22, duration: 0.42, ease: "power4.out" }, 2.72);
      tl.from("p", { opacity: 0, y: 16, duration: 0.38, ease: "circ.out" }, 2.86);
      tl.from(".stat", { opacity: 0, y: 20, duration: 0.36, stagger: 0.1, ease: "power2.out" }, 3.18);
      tl.from(".remix", { opacity: 0, scale: 0.58, duration: 0.38, ease: "back.out(1.8)" }, 3.62);
      tl.to(".sweep", { x: 1680, duration: 4.8, ease: "sine.inOut" }, 0.2);
      tl.to(".fork-line", { opacity: 0.42, duration: 0.45, stagger: 0.06, yoyo: true, repeat: 3, ease: "sine.inOut" }, 4.04);
      tl.to(".fork", { y: -7, duration: 0.54, stagger: 0.08, yoyo: true, repeat: 1, ease: "sine.inOut" }, 4.42);
      tl.to(".remix", { scale: 1.06, duration: 0.38, yoyo: true, repeat: 2, ease: "sine.inOut" }, 4.74);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
